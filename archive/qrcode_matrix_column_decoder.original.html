<style>
:root {

*{box-sizing:border-box}
body{margin:0;background:radial-gradient(ellipse at 50% 0%,#0d1e30 0%,#02050a 48%,#000 100%);color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;overflow:hidden}
#noise{position:fixed;inset:0;pointer-events:none;opacity:.22;mix-blend-mode:screen;background-image:repeating-linear-gradient(0deg,rgba(255,255,255,.05) 0 1px,transparent 1px 3px);animation:scan 6s linear infinite}

.shell{position:fixed;inset:16px;border:1px solid rgba(0,229,255,.32);box-shadow:0 0 0 1px rgba(255,255,255,.03),0 0 70px rgba(0,229,255,.12) inset,0 0 50px rgba(0,229,255,.08);background:linear-gradient(180deg,rgba(3,12,22,.82),rgba(1,4,9,.94));overflow:hidden}
.topbar{position:absolute;left:0;right:0;top:0;height:42px;border-bottom:1px solid rgba(0,229,255,.25);display:flex;align-items:center;gap:18px;padding:0 18px;background:rgba(3,9,16,.82);letter-spacing:.08em;text-transform:uppercase;font-size:12px}
.logo{color:var(--cyan);text-shadow:0 0 16px var(--cyan);font-weight:800}
.pill{color:var(--muted)}
.main{position:absolute;inset:42px 0 0 0;display:grid;grid-template-columns:1fr minmax(360px, 32vw);}
.matrixWrap{position:relative;padding:24px 16px 20px 22px;overflow:hidden}
.qrFrame{position:relative;width:var(--qrw);aspect-ratio:1 / 1;max-height:calc(100vh - 110px);margin:auto;border:1px solid rgba(0,229,255,.28);background:radial-gradient(circle at 50% 45%,rgba(0,229,255,.09),rgba(0,0,0,.88) 58%);box-shadow:0 0 45px rgba(0,229,255,.12), inset 0 0 90px rgba(0,229,255,.08);overflow:hidden}

.colLabel{position:absolute;top:2px;transform:translateX(-50%);font-size:8px;color:rgba(0,229,255,.62);opacity:.75}
.compLabel{position:absolute;bottom:22px;transform:translateX(-50%) rotate(-80deg);transform-origin:center;font-size:7px;color:rgba(217,248,255,.28);white-space:nowrap}

.key{color:var(--cyan)}.read{color:var(--green)}.hyp{color:var(--amber)}.status{color:var(--red)}.sym{color:var(--mag)}

.flash.show{animation:flash 900ms ease-out forwards}

const qr = document.getElementById('qr');
const consoleEl = document.getElementById('console');
const W=259, H=259;
function pxX(x){ return (x/W*100).toFixed(4)+'%'; }
function pxY(y){ return (y/H*100).toFixed(4)+'%'; }
function nodeById(n){return DATA.nodes.find(d=>d.node===n)}
function emitLabels(){
  DATA.nodes.forEach(nd=>{
    const lab=document.createElement('div'); lab.className='colLabel'; lab.textContent=String(nd.node).padStart(2,'0'); lab.style.left=pxX(nd.x); qr.appendChild(lab);
    const comp=document.createElement('div'); comp.className='compLabel'; comp.textContent='C'+nd.comps.join('/'); comp.style.left=pxX(nd.x); qr.appendChild(comp);
    const box=document.createElement('div'); box.className='nodeBox'; box.id='box_'+nd.node; if(nd.node===22) box.classList.add('routine');
    let pad=4.2; box.style.left=pxX(nd.minX-pad); box.style.top=pxY(Math.max(0,nd.minY-6)); box.style.width=((nd.maxX-nd.minX+pad*2)/W*100).toFixed(4)+'%'; box.style.height=((nd.maxY-nd.minY+12)/H*100).toFixed(4)+'%';
    qr.appendChild(box);
  });
}
function emitGlyphs(){
  const hotNodes=new Set([1,5,7,22,34,35,37]);
  DATA.glyphs.forEach((g,idx)=>{
    const el=document.createElement('span'); el.className='glyph'; el.textContent=g.char; el.dataset.node=g.node;
    if(hotNodes.has(g.node)) el.classList.add('hot');
    if(g.node===22) el.classList.add('node22');
    el.style.left=pxX(g.x); el.style.top=pxY(g.y);
    const delay = 140 + (g.node*42) + (g.i*18) + (Math.random()*90|0);
    el.style.setProperty('--d', delay);
    qr.appendChild(el);
  });
}
function updateNode(n){
  DATA.nodes.forEach(nd=>{ const b=document.getElementById('box_'+nd.node); if(b) b.classList.toggle('active', nd.node===n); });
  const nd=nodeById(n); if(!nd) return;
  const note=nd.note;
  document.getElementById('nodeTitle').textContent='[NODE_'+String(n).padStart(2,'0')+']: '+note.tag;
  document.getElementById('read').textContent=note.read;
  document.getElementById('hyp').textContent=note.hyp;
  document.getElementById('status').textContent=note.status;
  let extra='';
  if(note.symbols) extra += '<span class="sym">[SYMBOLS]</span>: '+note.symbols+'<br>';
  if(note.anagrams) extra += '<span class="sym">[ANAGRAMS]</span>: '+note.anagrams;
  document.getElementById('extra').innerHTML=extra;
}
function appendLog(nd){
  const div=document.createElement('div'); div.className='logLine';
  div.innerHTML='<span class="n">[NODE_'+String(nd.node).padStart(2,'0')+']</span> <span class="s">'+escapeHtml(nd.label)+'</span> <span class="st">// '+escapeHtml(nd.note.status||'OPEN')+'</span>';
  consoleEl.prepend(div);
  while(consoleEl.children.length>20) consoleEl.removeChild(consoleEl.lastChild);
}
function escapeHtml(s){return (s+'').replace(/[&<>]/g,c=>{return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c]})}
let seq=[22,5,7,1,16,21,34,35,37,22];
let allSeq=DATA.nodes.map(n=>n.node);
let activeSeq=seq, i=0, timer=null;
function play(sequence=seq, period=1850){
  activeSeq=sequence; i=0; if(timer) clearInterval(timer);
  function tick(){ const n=activeSeq[i%activeSeq.length]; updateNode(n); appendLog(nodeById(n)); i++; }
  tick(); timer=setInterval(tick,period);
}
function microFlash(content){
  const f=document.getElementById('flash'); const c=document.getElementById('flashCard');
  c.innerHTML=content; f.classList.remove('show'); void f.offsetWidth; f.classList.add('show');
}
document.addEventListener('keydown', e=>{
  if(e.code==='Space'){ e.preventDefault(); play(seq,1850); }
  if(e.key.toLowerCase()==='r'){ updateNode(22); microFlash('<span class="key">[NODE_22]</span>: ROUTINE TRIVIAL<br><span class="read">[READ]</span>: THE LOCK IS HABIT<br><span class="status">[STATUS]</span>: BLIND SPOT ACTIVE'); }
  if(e.key.toLowerCase()==='a'){ play(allSeq,830); }
  if(e.key.toLowerCase()==='f'){ microFlash('<span class="key">[TRACE]</span>: TGS → JSON → SHAPE PATHS<br><span class="hyp">[ASSERT]</span>: TEXT WAS NEVER TEXT<br><span class="status">[SEGMENT_41]</span>: CHANGED'); }
});
